services:
  db:
    image: postgres:16-alpine
    container_name: hpos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hpos
      POSTGRES_USER: hpos
      POSTGRES_PASSWORD: hpos
    ports:
      - "5432:5432"
    volumes:
      - hpos-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hpos -d hpos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hpos-postgres-data:
