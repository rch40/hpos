name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hpos
          POSTGRES_PASSWORD: hpos
          POSTGRES_DB: hpos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hpos:hpos@localhost:5432/hpos_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck --workspaces --if-present

      - name: Run rule engine unit tests
        run: npm run test -w apps/backend -- --reporter=verbose rules

      - name: Run API integration tests
        run: npm run test -w apps/backend -- --reporter=verbose api
        env:
          DATABASE_URL: postgresql://hpos:hpos@localhost:5432/hpos_test
